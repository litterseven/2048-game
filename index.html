<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>✨ 魔法少女 2048 ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        /* 动态流光魔法背景 */
        background: linear-gradient(-45deg, #ffb6c1, #fecfef, #e0c3fc, #c2e9fb);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        font-family: "Nunito", "Helvetica Neue", Arial, sans-serif;
        touch-action: none;
        overflow: hidden;
        color: #fff;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* 浮动背景星星 */
      .bg-star {
        position: absolute;
        color: rgba(255, 255, 255, 0.6);
        pointer-events: none;
        animation: floatStar 4s ease-in-out infinite alternate;
      }
      @keyframes floatStar {
        0% {
          transform: translateY(0) scale(0.8);
          opacity: 0.3;
        }
        100% {
          transform: translateY(-20px) scale(1.2);
          opacity: 0.8;
          text-shadow: 0 0 10px #fff;
        }
      }

      /* 玻璃拟物化 UI */
      .glass-panel {
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow:
          0 8px 32px 0 rgba(255, 182, 193, 0.3),
          inset 0 0 20px rgba(255, 255, 255, 0.4);
      }

      /* 魔法文字渐变 */
      .magic-text {
        background: linear-gradient(to right, #ff69b4, #9370db, #ff1493);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0px 4px 15px rgba(255, 105, 180, 0.4);
        animation: textShine 3s linear infinite;
        background-size: 200% auto;
      }
      @keyframes textShine {
        to {
          background-position: 200% center;
        }
      }

      .game-container {
        border-radius: 20px;
        width: 100%;
        max-width: 500px;
        aspect-ratio: 1 / 1;
        position: relative;
        padding: 12px;
        box-sizing: border-box;
        z-index: 10;
      }

      .grid-container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 12px;
        width: 100%;
        height: 100%;
      }

      .grid-cell {
        background-color: rgba(255, 255, 255, 0.3);
        border-radius: 16px;
        box-shadow: inset 0 2px 10px rgba(255, 182, 193, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }

      .tile-container {
        position: absolute;
        top: 12px;
        left: 12px;
        right: 12px;
        bottom: 12px;
        pointer-events: none;
      }

      .tile {
        position: absolute;
        display: flex;
        justify-content: center;
        align-items: center;
        transition:
          transform 150ms ease-in-out,
          opacity 150ms ease-in-out;
        z-index: 10;
      }

      .tile-inner {
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.6);
        transition:
          background 150ms ease-in-out,
          box-shadow 150ms ease-in-out;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.15);
      }

      .animate-appear {
        animation: appear 200ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .animate-pop {
        animation: pop 300ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      @keyframes appear {
        0% {
          opacity: 0;
          transform: scale(0.5) rotate(-10deg);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }

      @keyframes pop {
        0% {
          transform: scale(0.9);
          filter: brightness(1);
        }
        50% {
          transform: scale(1.2);
          filter: brightness(1.3);
          box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
        }
        100% {
          transform: scale(1);
          filter: brightness(1);
        }
      }

      /* 魔法粒子动画 */
      .magic-particle {
        position: absolute;
        pointer-events: none;
        z-index: 50;
        animation: particleBurst 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
      }
      @keyframes particleBurst {
        0% {
          transform: translate(0, 0) scale(0.5);
          opacity: 1;
        }
        100% {
          transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(180deg);
          opacity: 0;
        }
      }

      /* 交互按钮 */
      .btn-magic {
        background: linear-gradient(
          135deg,
          #ff9a9e 0%,
          #fecfef 99%,
          #fecfef 100%
        );
        color: #d87093;
        box-shadow:
          0 4px 15px rgba(255, 182, 193, 0.6),
          inset 0 2px 0 rgba(255, 255, 255, 0.8);
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        border: 2px solid rgba(255, 255, 255, 0.6);
      }
      .btn-magic:hover {
        transform: translateY(-3px) scale(1.05);
        box-shadow:
          0 8px 25px rgba(255, 182, 193, 0.8),
          inset 0 2px 0 rgba(255, 255, 255, 1);
        color: #ff1493;
      }
      .btn-magic:active {
        transform: translateY(1px) scale(0.98);
      }
    </style>
  </head>
  <body class="flex flex-col items-center justify-center min-h-screen p-4">
    <!-- 氛围装饰 -->
    <div
      class="bg-star text-2xl"
      style="top: 10%; left: 15%; animation-delay: 0s"
    >
      ✨
    </div>
    <div
      class="bg-star text-3xl"
      style="top: 20%; right: 20%; animation-delay: 1s"
    >
      🌸
    </div>
    <div
      class="bg-star text-xl"
      style="bottom: 15%; left: 25%; animation-delay: 2s"
    >
      💖
    </div>
    <div
      class="bg-star text-4xl"
      style="bottom: 25%; right: 15%; animation-delay: 0.5s"
    >
      ✨
    </div>

    <div
      class="w-full max-w-[500px] mb-4 flex justify-between items-start z-10"
    >
      <h1 class="text-5xl font-black magic-text tracking-tight pb-2">
        2048<span class="text-3xl ml-2 drop-shadow-md">🪄</span>
      </h1>
      <div class="flex gap-3 font-bold text-center">
        <div class="glass-panel rounded-2xl px-5 py-2">
          <div
            class="text-[#ff69b4] text-[11px] uppercase tracking-widest font-black"
          >
            ✨ 分数
          </div>
          <div id="score" class="text-2xl font-black text-[#8a2be2]">0</div>
        </div>
        <div class="glass-panel rounded-2xl px-5 py-2">
          <div
            class="text-[#ff69b4] text-[11px] uppercase tracking-widest font-black"
          >
            👑 最高
          </div>
          <div id="best-score" class="text-2xl font-black text-[#8a2be2]">
            0
          </div>
        </div>
      </div>
    </div>

    <div
      class="w-full max-w-[500px] flex justify-between items-center mb-6 z-10"
    >
      <p
        class="text-[#8a2be2] text-sm font-black glass-panel px-5 py-2.5 rounded-full flex items-center gap-2"
      >
        🌟 合并出魔法 <strong class="text-[#ff1493] text-lg">2048</strong>
      </p>
      <button
        onclick="initGame()"
        class="btn-magic font-black py-2.5 px-6 rounded-full text-sm"
      >
        🪄 重新施法
      </button>
    </div>

    <div class="game-container glass-panel">
      <div class="grid-container" id="grid-background">
        <!-- 背景格子 -->
      </div>
      <div class="tile-container" id="tile-container">
        <!-- 动态生成的方块 -->
      </div>

      <!-- 游戏结束/复活遮罩 -->
      <div
        id="game-over"
        class="hidden absolute inset-0 bg-white/40 backdrop-blur-md flex flex-col items-center justify-center rounded-2xl z-20 border-2 border-white/60 shadow-[0_0_50px_rgba(255,105,180,0.4)]"
      >
        <h2 class="text-6xl font-black magic-text mb-2">哎呀! 🥺</h2>
        <p
          class="text-[#8a2be2] font-black mb-8 text-lg bg-white/50 px-4 py-1 rounded-full"
        >
          魔力耗尽了哦
        </p>
        <div class="flex flex-col gap-4 w-4/5">
          <button
            onclick="revive()"
            class="bg-gradient-to-r from-[#ff69b4] to-[#9370db] hover:from-[#ff1493] hover:to-[#8a2be2] text-white font-black py-4 px-6 rounded-2xl text-lg shadow-[0_10px_20px_rgba(147,112,219,0.4)] border-2 border-white/50 transition-all active:scale-95 hover:scale-[1.02]"
          >
            💖 星光复活 (消除最低阶)
          </button>
          <button
            onclick="initGame()"
            class="btn-magic font-black py-3 px-6 rounded-2xl text-lg transition-all active:scale-95"
          >
            🔄 重新凝聚魔力
          </button>
        </div>
      </div>
    </div>

    <div
      class="w-full max-w-[500px] mt-8 text-[#8a2be2] text-sm font-black text-center glass-panel p-4 rounded-2xl z-10"
    >
      ✨ 轻轻滑动屏幕 或 使用方向键 ✨<br /><span class="text-[#ff69b4]"
        >相同的数字相遇会释放魔法合并哦！</span
      >
    </div>

    <script>
      const gridBg = document.getElementById("grid-background");
      const tileContainer = document.getElementById("tile-container");
      const scoreEl = document.getElementById("score");
      const bestScoreEl = document.getElementById("best-score");
      const gameOverEl = document.getElementById("game-over");

      let board = Array(4)
        .fill()
        .map(() => Array(4).fill(null));
      let tiles = {};
      let tileIdCounter = 0;
      let score = 0;
      let bestScore = localStorage.getItem("2048-magic-best") || 0;
      let isGameOver = false;

      // 魔法渐变色卡
      const tileConfigs = {
        2: {
          bg: "linear-gradient(135deg, #fff0f5, #ffe4e1)",
          color: "#d87093",
          size: "42px",
          shadow: "0 4px 10px rgba(255,228,225,0.8)",
        },
        4: {
          bg: "linear-gradient(135deg, #ffb6c1, #ffc0cb)",
          color: "#fff",
          size: "42px",
          shadow: "0 4px 12px rgba(255,182,193,0.8)",
        },
        8: {
          bg: "linear-gradient(135deg, #ff9a9e, #fecfef)",
          color: "#fff",
          size: "42px",
          shadow: "0 4px 15px rgba(255,154,158,0.8)",
        },
        16: {
          bg: "linear-gradient(135deg, #fbc2eb, #a6c1ee)",
          color: "#fff",
          size: "40px",
          shadow: "0 6px 15px rgba(251,194,235,0.8)",
        },
        32: {
          bg: "linear-gradient(135deg, #a18cd1, #fbc2eb)",
          color: "#fff",
          size: "40px",
          shadow: "0 6px 20px rgba(161,140,209,0.8)",
        },
        64: {
          bg: "linear-gradient(135deg, #ff99cc, #ff66b2)",
          color: "#fff",
          size: "40px",
          shadow: "0 6px 20px rgba(255,102,178,0.8)",
        },
        128: {
          bg: "linear-gradient(135deg, #b721ff, #21d4fd)",
          color: "#fff",
          size: "32px",
          shadow: "0 8px 25px rgba(183,33,255,0.8)",
        },
        256: {
          bg: "linear-gradient(135deg, #00c6ff, #0072ff)",
          color: "#fff",
          size: "32px",
          shadow: "0 8px 25px rgba(0,198,255,0.8)",
        },
        512: {
          bg: "linear-gradient(135deg, #fce38a, #f38181)",
          color: "#fff",
          size: "32px",
          shadow: "0 8px 30px rgba(243,129,129,0.9)",
        },
        1024: {
          bg: "linear-gradient(135deg, #f6d365, #fda085)",
          color: "#fff",
          size: "26px",
          shadow: "0 10px 35px rgba(253,160,133,0.9)",
        },
        2048: {
          bg: "linear-gradient(135deg, #ff0844, #ffb199)",
          color: "#fff",
          size: "26px",
          shadow: "0 10px 40px rgba(255,8,68,1)",
        },
        super: {
          bg: "linear-gradient(135deg, #fccb90, #d57eeb)",
          color: "#fff",
          size: "24px",
          shadow: "0 10px 50px rgba(213,126,235,1)",
        },
      };

      // 初始化背景网格
      for (let i = 0; i < 16; i++) {
        const cell = document.createElement("div");
        cell.className = "grid-cell";
        gridBg.appendChild(cell);
      }

      bestScoreEl.textContent = bestScore;

      function initGame() {
        board = Array(4)
          .fill()
          .map(() => Array(4).fill(null));
        tiles = {};
        tileIdCounter = 0;
        score = 0;
        isGameOver = false;
        tileContainer.innerHTML = "";
        scoreEl.textContent = score;
        gameOverEl.classList.add("hidden");

        addRandomTile();
        addRandomTile();
        renderBoard();
      }

      function revive() {
        let activeTiles = Object.values(tiles).filter((t) => !t.isDeleted);
        activeTiles.sort((a, b) => a.val - b.val);

        const removeCount = Math.min(6, activeTiles.length);
        let deletedThisTurn = [];

        for (let i = 0; i < removeCount; i++) {
          let t = activeTiles[i];
          board[t.r][t.c] = null;
          t.isDeleted = true;
          deletedThisTurn.push(t);

          let el = document.getElementById("tile-" + t.id);
          if (el) {
            el.style.transform += " scale(0) rotate(360deg)";
            el.style.opacity = "0";
            createParticleBurst(t.c, t.r, "✨");
          }
        }

        isGameOver = false;
        gameOverEl.classList.add("hidden");

        setTimeout(() => {
          deletedThisTurn.forEach((t) => {
            let el = document.getElementById("tile-" + t.id);
            if (el) el.remove();
            delete tiles[t.id];
          });
        }, 300);

        renderBoard();
      }

      function addRandomTile() {
        const emptyCells = [];
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (!board[r][c]) emptyCells.push({ r, c });
          }
        }
        if (emptyCells.length > 0) {
          const { r, c } =
            emptyCells[Math.floor(Math.random() * emptyCells.length)];
          const val = Math.random() < 0.8 ? 2 : 4;
          const newTile = {
            id: tileIdCounter++,
            val: val,
            r: r,
            c: c,
            isNew: true,
            isMerged: false,
          };
          board[r][c] = newTile;
          tiles[newTile.id] = newTile;
        }
      }

      // 魔法粒子特效生成
      function createParticleBurst(c, r, emoji = "✨") {
        const containerWidth = gridBg.offsetWidth;
        const gap = 12;
        const cellSize = (containerWidth - gap * 3) / 4;
        const x = c * (cellSize + gap) + cellSize / 2;
        const y = r * (cellSize + gap) + cellSize / 2;

        for (let i = 0; i < 6; i++) {
          let particle = document.createElement("div");
          particle.className =
            "magic-particle text-xl drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]";
          particle.innerText = Math.random() > 0.5 ? emoji : "💖";
          particle.style.left = `${x - 14}px`;
          particle.style.top = `${y - 14}px`;
          particle.style.setProperty(
            "--tx",
            `${(Math.random() - 0.5) * 100}px`,
          );
          particle.style.setProperty(
            "--ty",
            `${(Math.random() - 0.5) * 100}px`,
          );
          tileContainer.appendChild(particle);
          setTimeout(() => particle.remove(), 600);
        }
      }

      function renderBoard(deletedTiles = []) {
        const containerWidth = gridBg.offsetWidth;
        const gap = 12;
        const cellSize = (containerWidth - gap * 3) / 4;

        Object.values(tiles).forEach((t) => {
          if (t.isDeleted) return;

          let el = document.getElementById("tile-" + t.id);
          let inner;

          if (!el) {
            el = document.createElement("div");
            el.id = "tile-" + t.id;
            el.className = "tile";
            inner = document.createElement("div");
            inner.className =
              "tile-inner w-full h-full flex items-center justify-center font-black";
            el.appendChild(inner);
            tileContainer.appendChild(el);
          } else {
            inner = el.querySelector(".tile-inner");
          }

          const config = tileConfigs[t.val] || tileConfigs.super;

          el.style.width = `${cellSize}px`;
          el.style.height = `${cellSize}px`;
          el.style.transform = `translate(${t.c * (cellSize + gap)}px, ${t.r * (cellSize + gap)}px)`;

          inner.textContent = t.val;
          inner.style.background = config.bg;
          inner.style.color = config.color;
          inner.style.fontSize = config.size;
          inner.style.boxShadow = config.shadow;

          inner.classList.remove("animate-appear", "animate-pop");
          void inner.offsetWidth;

          if (t.isNew) {
            inner.classList.add("animate-appear");
          }
          if (t.isMerged) {
            inner.classList.add("animate-pop");
            el.style.zIndex = "15";
            createParticleBurst(t.c, t.r); // 触发合并光效
          } else {
            el.style.zIndex = "10";
          }
        });

        deletedTiles.forEach((t) => {
          let el = document.getElementById("tile-" + t.id);
          if (el) {
            el.style.transform = `translate(${t.c * (cellSize + gap)}px, ${t.r * (cellSize + gap)}px)`;
            el.style.zIndex = "5";
          }
        });

        setTimeout(() => {
          deletedTiles.forEach((t) => {
            let el = document.getElementById("tile-" + t.id);
            if (el) el.remove();
            delete tiles[t.id];
          });
        }, 150);

        // 分数动画
        if (score > parseInt(scoreEl.textContent)) {
          scoreEl.style.transform = "scale(1.3)";
          setTimeout(() => (scoreEl.style.transform = "scale(1)"), 150);
        }

        scoreEl.textContent = score;
        if (score > bestScore) {
          bestScore = score;
          bestScoreEl.textContent = bestScore;
          localStorage.setItem("2048-magic-best", bestScore);
        }

        if (checkGameOver()) {
          isGameOver = true;
          setTimeout(() => {
            gameOverEl.classList.remove("hidden");
          }, 800);
        }
      }

      function move(direction) {
        if (isGameOver) return;

        let moved = false;
        let deletedThisTurn = [];

        Object.values(tiles).forEach((t) => {
          t.isNew = false;
          t.isMerged = false;
        });

        const getCell = (i, j) =>
          direction === "left" || direction === "right"
            ? board[i][j]
            : board[j][i];
        const setCell = (i, j, val) => {
          if (direction === "left" || direction === "right") board[i][j] = val;
          else board[j][i] = val;
        };

        for (let i = 0; i < 4; i++) {
          let line = [];
          for (let j = 0; j < 4; j++) {
            let cell = getCell(i, j);
            if (cell) line.push(cell);
          }

          if (direction === "right" || direction === "down") line.reverse();

          let targetIdx = 0;
          let newLine = Array(4).fill(null);

          for (let k = 0; k < line.length; k++) {
            let rTarget =
              direction === "left" || direction === "right"
                ? i
                : direction === "up"
                  ? targetIdx
                  : 3 - targetIdx;
            let cTarget =
              direction === "left" || direction === "right"
                ? direction === "left"
                  ? targetIdx
                  : 3 - targetIdx
                : i;

            if (k < line.length - 1 && line[k].val === line[k + 1].val) {
              let mergedVal = line[k].val * 2;
              score += mergedVal;

              let newTile = {
                id: tileIdCounter++,
                val: mergedVal,
                r: rTarget,
                c: cTarget,
                isNew: false,
                isMerged: true,
              };
              tiles[newTile.id] = newTile;
              newLine[targetIdx] = newTile;

              line[k].r = rTarget;
              line[k].c = cTarget;
              line[k].isDeleted = true;
              line[k + 1].r = rTarget;
              line[k + 1].c = cTarget;
              line[k + 1].isDeleted = true;
              deletedThisTurn.push(line[k], line[k + 1]);

              k++;
              targetIdx++;
              moved = true;
            } else {
              if (line[k].r !== rTarget || line[k].c !== cTarget) moved = true;
              line[k].r = rTarget;
              line[k].c = cTarget;
              newLine[targetIdx] = line[k];
              targetIdx++;
            }
          }

          if (direction === "right" || direction === "down") newLine.reverse();

          for (let j = 0; j < 4; j++) setCell(i, j, newLine[j]);
        }

        if (moved) {
          addRandomTile();
          renderBoard(deletedThisTurn);
        }
      }

      function checkGameOver() {
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (!board[r][c]) return false;
            if (
              c !== 3 &&
              board[r][c] &&
              board[r][c + 1] &&
              board[r][c].val === board[r][c + 1].val
            )
              return false;
            if (
              r !== 3 &&
              board[r][c] &&
              board[r + 1][c] &&
              board[r][c].val === board[r + 1][c].val
            )
              return false;
          }
        }
        return true;
      }

      // 控制事件
      window.addEventListener("keydown", (e) => {
        if (
          [
            "ArrowUp",
            "ArrowDown",
            "ArrowLeft",
            "ArrowRight",
            "w",
            "a",
            "s",
            "d",
          ].includes(e.key)
        )
          e.preventDefault();
        switch (e.key) {
          case "ArrowUp":
          case "w":
          case "W":
            move("up");
            break;
          case "ArrowDown":
          case "s":
          case "S":
            move("down");
            break;
          case "ArrowLeft":
          case "a":
          case "A":
            move("left");
            break;
          case "ArrowRight":
          case "d":
          case "D":
            move("right");
            break;
        }
      });

      let touchStartX = 0;
      let touchStartY = 0;
      const gameContainer = document.querySelector(".game-container");

      gameContainer.addEventListener(
        "touchstart",
        (e) => {
          touchStartX = e.touches[0].clientX;
          touchStartY = e.touches[0].clientY;
        },
        { passive: false },
      );

      gameContainer.addEventListener(
        "touchmove",
        (e) => {
          e.preventDefault();
        },
        { passive: false },
      );

      gameContainer.addEventListener("touchend", (e) => {
        if (isGameOver) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;

        if (Math.max(Math.abs(dx), Math.abs(dy)) > 30) {
          if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 0) move("right");
            else move("left");
          } else {
            if (dy > 0) move("down");
            else move("up");
          }
        }
      });

      window.addEventListener("resize", () => renderBoard());

      initGame();
    </script>
  </body>
</html>
